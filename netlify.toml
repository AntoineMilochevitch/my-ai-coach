# Configuration Netlify — Phase 0 (frontend Vite + Functions).

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # Bundler esbuild : supporte TypeScript / import de .ts nativement.
  node_bundler = "esbuild"

# SPA : toutes les routes non-fichier renvoient index.html (react-router côté client).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
