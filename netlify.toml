# Configuration Netlify — Phase 0 (frontend Vite + Functions).

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Valeurs PUBLIQUES par conception (présentes dans le bundle frontend, anon key
  # protégée par la RLS Supabase) : on les exclut du scan de secrets Netlify pour
  # ne pas faire échouer le build. Les vraies clés (service_role, chiffrement,
  # Gemini) ne sont PAS listées ici → elles restent surveillées.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,SUPABASE_URL"

[functions]
  # Bundler esbuild : supporte TypeScript / import de .ts nativement.
  node_bundler = "esbuild"

# SPA : toutes les routes non-fichier renvoient index.html (react-router côté client).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
